id: blink_led
name: Blink LED
board: tang_nano_20k
backend: gowin
instances:
  - id: clock
    block: clock.27mhz
    parameters: {}
  - id: counter
    block: arithmetic.counter
    parameters:
      width: "25"
  - id: led0
    block: io.led
    parameters:
      active_low: "true"
connections:
  - from: clock.clk
    to: counter.clk
  - from: counter.value
    to: led0.input
